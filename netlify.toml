[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install"

[functions]
  node_bundler = "zisi"

[functions."zoho-webhook"]
  timeout = 26

[functions."form-submit"]
  timeout = 26

[functions."ai"]
  timeout = 26

[functions."store-file"]
  timeout = 26

[functions."get-files"]
  timeout = 26

[functions."templates"]
  timeout = 26

[functions."extract-risc"]
  timeout = 26

[[redirects]]
  from = "/submit"
  to = "/submit.html"
  status = 200

[[redirects]]
  from = "/callback"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/zoho-callback"
  to = "/index.html?zoho_code=:code&zoho=1"
  status = 200

[[redirects]]
  from = "/api/webhook"
  to = "/.netlify/functions/zoho-webhook"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
